name: Build and Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - '*.*.*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.devcontainer/**'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'

  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.devcontainer/**'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'

  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request'
    uses: chriskacerguis/build/.github/workflows/build.yml@main
    with:
      image_title: ARESnet Logger
      image_description: Logging systems build for ARES / EmComm ham radio nets
    permissions:
      contents: read
      packages: write
    secrets: inherit